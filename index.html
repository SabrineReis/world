<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareTrip</title>

    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/73b8aa3d7c.js" crossorigin="anonymous"></script>
</head>

<body class="container">

    <header class="main">
        <nav class="nav-main">
            <h1 class="logo">ShareTrip</h1>
            <ul class="menu">
                <li><a href="#discover">Discorver</a></li>
                <li><a href="#destination">Destination</a></li>
                <li><a href="#aboutUs">About Us</a></li>
                <li><a href="#contactUs">Contact Us</a></li>
            </ul>
            <div class="btn">
                <a href="#" class="btn-white">Sign in</a>
                <a href="#" class="btn-orange">Register</a>
            </div>
        </nav>
    </header>

    <section class="plan">
        <h2>Let's Plan <br> An Adventure Trip</h2>
        <p>We always make our customer happy by providing as many choiss as possible.</p>
        <form action="" method="post">
            <div class="location">
                <label for="location">Location
                    <i class="fa-solid fa-location-crosshairs"></i>
                </label>
                <input type="text" name="location" id="location" placeholder="Enter your destinations">
            </div>
            <div class="date">
                <label for="date">Date
                    <i class="fa-solid fa-calendar"></i>
                </label>
                <input type="text" name="date" id="date" placeholder="When it will start">
            </div>
            <div class="people">
                <label for="people">People
                    <i class="fa-solid fa-people-group"></i>
                </label>
                <input type="text" name="people" id="people" placeholder="How many people?">
            </div>
            <button type="submit">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>
        <div class="planet">
            <img src="./img/earth-4237270.png" alt="Planeta">
        </div>
    </section>

</body>

</html>
